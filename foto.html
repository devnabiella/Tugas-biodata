<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lampiran Foto Dokumentasi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    padding:40px 20px;

    background:
        linear-gradient(135deg,#667eea,#764ba2),
        repeating-linear-gradient(
            45deg,
            rgba(255,255,255,0.05) 0px,
            rgba(255,255,255,0.05) 20px,
            transparent 20px,
            transparent 40px
        );
    background-blend-mode: overlay;
}

/* JUDUL */
h1{
    text-align:center;
    color:white;
    margin-bottom:10px;
    font-size:32px;
}

.subtitle{
    text-align:center;
    color:white;
    opacity:0.9;
    margin-bottom:40px;
}

/* CONTAINER FOTO */
.gallery{
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

/* CARD FOTO */
.photo-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    transition:0.3s;
}

.photo-card:hover{
    transform:translateY(-8px);
}

.photo-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.caption{
    padding:15px;
    font-size:14px;
    text-align:center;
}

/* TOMBOL KEMBALI */
.back-btn{
    display:block;
    width:200px;
    margin:50px auto 0;
    text-align:center;
    padding:10px;
    background:#ffd369;
    color:#333;
    text-decoration:none;
    border-radius:12px;
    font-weight:500;
    transition:0.3s;
}

.back-btn:hover{
    background:white;
}
</style>
</head>

<body>

<h1>˗ˏˋ Lampiran Foto Dokumentasi ˎˊ˗</h1>
<p class="subtitle">Berikut adalah dokumentasi forum biodata dengan XAMPP.</p>

<div class="gallery">

    <div class="photo-card">
        <img src="images/hosting.png" alt="hosting">
        <div class="caption">Tampilan server saat sedang running</div>
    </div>

    <div class="photo-card">
        <img src="images/forum.png" alt="forum">
        <div class="caption">Tampilan forum sebelum di isi</div>
    </div>

    <div class="photo-card">
       <img src="images/hasil.png" alt="hasil">
        <div class="caption">Tampilan forum sudah di isi</div>
    </div>

    <div class="photo-card">
        <img src="images/file.png" alt="file">
        <div class="caption">Tampilan struktur folder nya.</div>
    </div>

</div>

<a href="index.html" class="back-btn">⬅ Kembali ke Menu</a>

</body>
</html>
